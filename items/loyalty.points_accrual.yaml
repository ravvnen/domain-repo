item_id: loyalty.points_accrual
title: Loyalty Points Accrual and Redemption
content: |
  **Loyalty Program Tiers:**

  | Tier | Requirement | Points Multiplier | Benefits |
  |------|-------------|-------------------|----------|
  | Bronze | Default (all customers) | 1x ($1 spent = 10 points) | Standard |
  | Silver | $500 LTV or 5 orders | 1.5x ($1 spent = 15 points) | Free shipping >$50 |
  | Gold | $2000 LTV or 15 orders | 2x ($1 spent = 20 points) | Free shipping + priority support |
  | Platinum | $10,000 LTV or 50 orders | 3x ($1 spent = 30 points) | All above + dedicated account manager |

  **Points Accrual Rules:**

  **Earning Points:**
  - **Purchase:** Base = $1 spent → 10 points (before tier multiplier)
  - **Product review:** +100 points (one-time per product)
  - **Referral:** +500 points (when referred friend makes first purchase)
  - **Birthday:** +250 points (once per year)
  - **Social media share:** +50 points (max 3x per month)

  **Points Calculation Example:**
  ```
  Order total: $150 (after discounts, before tax/shipping)
  Customer tier: Gold (2x multiplier)
  Points earned: 150 * 10 * 2 = 3000 points
  ```

  **When Points Are Credited:**
  - **NOT at order placement** (customer could cancel/return)
  - **YES when order reaches DELIVERED state**
  - If order returned → deduct points

  **Points Redemption:**

  - **Redemption rate:** 100 points = $1 discount
  - **Minimum redemption:** 500 points ($5)
  - **Maximum per order:** 50% of order total
     - Example: $100 order → max $50 discount from points

  - **Combining with promo codes:**
     - ✅ Can use points + percentage-off promo (e.g., 20% off code + points)
     - ❌ Cannot use points + dollar-off promo (e.g., $10 off code)

  **Points Expiration:**
  - Points expire after 12 months of account inactivity
  - "Inactivity" = no purchases, no points earned
  - Send warning email 30 days before expiration

  **Clawback Rules (prevent fraud):**
  - If customer returns >50% of orders → ban from loyalty program
  - If customer abuses referral system (fake accounts) → void all points + ban

  **Event Payload Example:**
  ```json
  {
    "customerId": "UUID",
    "transaction": {
      "type": "enum: EARNED | REDEEMED | EXPIRED | VOIDED",
      "points": "number (can be negative for redemption)",
      "reason": "enum: PURCHASE | REVIEW | REFERRAL | etc.",
      "orderId": "UUID (if applicable)",
      "transactedAt": "ISO8601"
    },
    "currentBalance": "number",
    "tier": "enum: BRONZE | SILVER | GOLD | PLATINUM"
  }
  ```
